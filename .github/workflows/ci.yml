name: CI

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  PYTEST_ADDOPTS: "--tb=short -q"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff black
      - name: Ruff lint
        run: ruff check vina/ tests/
      - name: Black format check
        run: black --check vina/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: mypy
        run: mypy vina/ tests/

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Bandit
        run: bandit -r vina/ -c pyproject.toml
      - name: pip-audit
        run: pip-audit

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[testing]"
      - name: Run tests
        run: python -m pytest tests/ --cov=vina --cov-report=xml --cov-report=term
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [unit, lint, typecheck, security]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[testing]"
      - name: Run integration tests
        run: python -m pytest tests/test_testing.py -v -k "integration or sandbox or runner"

  benchmark:
    name: Benchmark Suite
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[testing]"
      - name: Run benchmarks
        run: |
          python -m pytest tests/test_testing.py -v -k "benchmark or metrics or profile"

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [lint, typecheck, security, unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install build
        run: pip install build
      - name: Build wheel and sdist
        run: python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  qualify:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [lint, typecheck, security, unit, build]
    steps:
      - uses: actions/checkout@v4
      - name: Check quality thresholds
        run: |
          echo "=== Quality Gate ==="
          echo "Lint: passed"
          echo "Type Check: passed"
          echo "Security: passed"
          echo "Unit Tests: passed"
          echo "Build: passed"
          echo "Quality gate: PASSED"
