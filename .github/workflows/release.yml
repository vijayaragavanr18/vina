name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine cyclonedx-bom

      - name: Build wheel and sdist
        run: python -m build

      - name: Generate SBOM
        run: |
          cyclonedx-py requirements \
            --format json \
            --output dist/vina.sbom.json

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          sha512sum * > SHA512SUMS

      - name: Sign release manifest
        run: |
          echo "vina-release-$(echo ${{ github.ref_name }} | sed 's/^v//')" > dist/VERSION
          echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> dist/RELEASE_MANIFEST.txt
          echo "Artifacts:" >> dist/RELEASE_MANIFEST.txt
          ls -la dist/ >> dist/RELEASE_MANIFEST.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: VINA ${{ github.ref_name }}
          body_path: CHANGELOG.md
          draft: true
          prerelease: false
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.sbom.json
            dist/SHA256SUMS
            dist/SHA512SUMS
            dist/RELEASE_MANIFEST.txt
            dist/VERSION

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/*.whl dist/*.tar.gz --skip-existing

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
          labels: |
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.revision=${{ github.sha }}
